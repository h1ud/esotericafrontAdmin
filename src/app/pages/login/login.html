<div class="body">
  <div class="panel-login">
    <div *ngIf="errorMessage" class="error-message" style="color: red;">
      {{ errorMessage }}
    </div>

    <div class="title-login">
      <label>Usuario:</label>
    </div>
    <div class="input-username">
      <input type="text" [(ngModel)]="loginData.username" name="username" placeholder="Ingresa tu usuario">
    </div>

    <div class="title-password">
      <label>Contraseña</label>
    </div>
    <div class="input-password">
      <input type="password" [(ngModel)]="loginData.password" name="password" placeholder="Ingresa tu contraseña">
    </div>

    <div class="buttom-login">
      <button (click)="onLogin()">Iniciar Sesión</button>
    </div>
  </div>
</div>
