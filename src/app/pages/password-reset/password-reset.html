<div class="reset-container">
  <h1>Recuperación de Cuenta</h1>

  <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>

  <div class="form-container">
    <h2>Esoterica - Solicitud de Soporte</h2>
    <p class="subtitle">Complete los datos para recuperar su cuenta</p>

    <form>
      <div class="form-row">
        <div class="form-group">
          <label>Nombre:</label>
          <input type="text" [(ngModel)]="formData.name" name="name" placeholder="Ingresa tu nombre" />
        </div>
        <div class="form-group">
          <label>Apellido:</label>
          <input type="text" [(ngModel)]="formData.lastName" name="lastName" placeholder="Ingresa tu apellido" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Usuario:</label>
          <input type="text" [(ngModel)]="formData.username" name="username" placeholder="Ingresa tu nombre de usuario" />
        </div>
        <div class="form-group">
          <label>Correo Electrónico:</label>
          <input
            type="email"
            [(ngModel)]="formData.email"
            name="email"
            placeholder="ejemplo@correo.com"
            required
            email
            #emailInput="ngModel"
          />

          <span *ngIf="emailInput.invalid && (emailInput.dirty || emailInput.touched)" class="error-text">
            <small *ngIf="emailInput.errors?.['required']">El correo es obligatorio.</small>
            <small *ngIf="emailInput.errors?.['email']">Por favor, introduce un formato de correo válido.</small>
          </span>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-save" [disabled]="loading" (click)="saveRequest()">
          {{ loading ? 'Enviando...' : 'Enviar Solicitud' }}
        </button>
        <button class="btn btn-back" (click)="goToLogin()">Volver al Login</button>
      </div>
    </form>
  </div>
</div>
